apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: django-metrics
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: vote-app-vote-app-chart
  namespaceSelector:
    matchNames:
      - ns-test
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
